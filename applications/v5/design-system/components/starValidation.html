<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Star Validation - GRA Design System</title>
  <link rel="stylesheet" href="../gra.css">
</head>
<body class="pageContent gra-padding-bottom-7xl">

  <main class="gra-container gra-padding-top-l">
    <h1 class="gra-font-3xl gra-margin-bottom-m">Star Validation</h1>

    <section class="gra-margin-top-xl">
      <h2>Exemplo</h2>
      <hr class="gra-hr-horizontal-dark-s">

      <div class="gra-row-bs">
        <div class="gra-col-bs-xl-1">
          <fieldset class="gra-rate">
            <input type="radio" id="rating10" name="rating" value="5"><label for="rating10" title="5 estrelas"></label>
            <input type="radio" id="rating9" name="rating" value="4.5"><label class="half" for="rating9" title="4 1/2 estrelas"></label>
            <input type="radio" id="rating8" name="rating" value="4"><label for="rating8" title="4 estrelas"></label>
            <input type="radio" id="rating7" name="rating" value="3.5"><label class="half" for="rating7" title="3 1/2 estrelas"></label>
            <input type="radio" id="rating6" name="rating" value="3"><label for="rating6" title="3 estrelas"></label>
            <input type="radio" id="rating5" name="rating" value="2.5" checked><label class="half" for="rating5" title="2 1/2 estrelas"></label>
            <input type="radio" id="rating4" name="rating" value="2"><label for="rating4" title="2 estrelas"></label>
            <input type="radio" id="rating3" name="rating" value="1.5"><label class="half" for="rating3" title="1 1/2 estrelas"></label>
            <input type="radio" id="rating2" name="rating" value="1"><label for="rating2" title="1 estrela"></label>
            <input type="radio" id="rating1" name="rating" value="0.5"><label class="half" for="rating1" title="1/2 estrela"></label>
          </fieldset>
        </div>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script type="module" src="../assets/main.js"></script>
</body>
</html>
