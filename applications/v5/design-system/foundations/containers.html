<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Containers Foundation</title>
  <link rel="stylesheet" href="../gra.css">
</head>
<body class="gra-background-gray-100" style="padding:24px;">
<main style="max-width:1200px;margin:auto;display:flex;flex-direction:column;gap:24px;">
<h1 class="gra-font-4xl">Containers</h1>
<section><h2 class="gra-font-2xl">Container Variants</h2>
<div class="gra-container gra-background-blue-100 gra-padding-m gra-rounded-m" style="border:1px dashed #94a3b8;">gra-container</div>
<div class="gra-container-bo gra-background-blue-200 gra-padding-m gra-rounded-m" style="border:1px dashed #94a3b8;">gra-container-bo</div>
<div class="gra-container-fluid gra-background-blue-300 gra-padding-m gra-rounded-m" style="border:1px dashed #94a3b8;">gra-container-fluid</div>
</section>
<section><h2 class="gra-font-2xl">Utilities</h2><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;">
<div class="gra-background-white gra-container gra-padding-s gra-rounded-s" style="border:1px solid #cbd5e1;">gra-container</div>
<div class="gra-background-white gra-container-bo gra-padding-s gra-rounded-s" style="border:1px solid #cbd5e1;">gra-container-bo</div>
<div class="gra-background-white gra-container-fluid gra-padding-s gra-rounded-s" style="border:1px solid #cbd5e1;">gra-container-fluid</div>
<div class="gra-background-white gra-width-100 gra-padding-s gra-rounded-s" style="border:1px solid #cbd5e1;">gra-width-100</div>
<div class="gra-background-white gra-height-100 gra-padding-s gra-rounded-s" style="border:1px solid #cbd5e1;">gra-height-100</div>
<div class="gra-background-white gra-pos-relative gra-padding-s gra-rounded-s" style="border:1px solid #cbd5e1;">gra-pos-relative</div>
</div></section>
</main>
</body>
</html>
