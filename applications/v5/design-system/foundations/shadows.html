<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shadows Foundation</title>
  <link rel="stylesheet" href="../gra.css">
</head>
<body class="gra-background-gray-100" style="padding:24px;">
<main style="max-width:1200px;margin:auto;display:flex;flex-direction:column;gap:24px;">
<h1 class="gra-font-4xl">Shadows</h1>
<section><h2 class="gra-font-2xl">Box Shadows</h2><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;">
<div class="gra-background-white gra-padding-l gra-rounded-m gra-box-shadow-l">gra-box-shadow-l</div>
<div class="gra-background-white gra-padding-l gra-rounded-m gra-box-shadow-m">gra-box-shadow-m</div>
<div class="gra-background-white gra-padding-l gra-rounded-m gra-box-shadow-s">gra-box-shadow-s</div>
<div class="gra-background-white gra-padding-l gra-rounded-m gra-box-shadow-xl">gra-box-shadow-xl</div>
<div class="gra-background-white gra-padding-l gra-rounded-m gra-box-shadow-xs">gra-box-shadow-xs</div>
<div class="gra-background-white gra-padding-l gra-rounded-m gra-box-shadow-xxl">gra-box-shadow-xxl</div>
</div></section>
<section><h2 class="gra-font-2xl">Text Shadows</h2><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;">
<div class="gra-background-white gra-padding-m gra-rounded-m"><p class="gra-text-shadow-l gra-font-xl">gra-text-shadow-l</p></div>
<div class="gra-background-white gra-padding-m gra-rounded-m"><p class="gra-text-shadow-m gra-font-xl">gra-text-shadow-m</p></div>
<div class="gra-background-white gra-padding-m gra-rounded-m"><p class="gra-text-shadow-s gra-font-xl">gra-text-shadow-s</p></div>
<div class="gra-background-white gra-padding-m gra-rounded-m"><p class="gra-text-shadow-xl gra-font-xl">gra-text-shadow-xl</p></div>
<div class="gra-background-white gra-padding-m gra-rounded-m"><p class="gra-text-shadow-xs gra-font-xl">gra-text-shadow-xs</p></div>
<div class="gra-background-white gra-padding-m gra-rounded-m"><p class="gra-text-shadow-xxl gra-font-xl">gra-text-shadow-xxl</p></div>
</div></section>
</main>
</body>
</html>
