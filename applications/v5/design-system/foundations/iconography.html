<!doctype html>
<html lang="pt">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iconografia — GRA Design System</title>
  <link rel="stylesheet" href="../gra.css">
</head>

<body class="gra-padding-bottom-7xl">

<main class="gra-container gra-padding-top-l">

<h1 class="gra-font-3xl gra-margin-bottom-xl">Iconografia</h1>

<!-- ======================= -->
<!-- SETAS -->
<!-- ======================= -->
<section class="gra-margin-bottom-2xl">
<h2 class="gra-font-xl gra-margin-bottom-l">Setas</h2>
<div class="icon-grid">
<i class="icon-arrow-circle-right"></i>
<i class="icon-arrow-circle-left"></i>
<i class="icon-arrow-circle-down"></i>
<i class="icon-arrow-circle-up"></i>

<i class="icon-chevron-down"></i>
<i class="icon-arrow-right"></i>
<i class="icon-arrow-left"></i>

<i class="icon-arrow-up"></i>
<i class="icon-download"></i>
<i class="icon-logout"></i>
<i class="icon-login"></i>
<i class="icon-upload"></i>
<i class="icon-sort"></i>
<i class="icon-order-down"></i>
<i class="icon-order-up"></i>
<i class="icon-refresh"></i>

<i class="icon-level-up"></i>

</div>

<i class="icon-file-download"></i>
<i class="icon-folder-add"></i>

<i class="icon-archive"></i>
</div>

<!-- FEEDBACK -->

<!-- ======================= -->
<!-- CALCULADORA -->
<!-- ======================= -->
<section class="gra-margin-bottom-2xl">
  <h2 class="gra-font-xl gra-margin-bottom-l">Calculadora</h2>
  <div class="icon-grid">

    <i class="icon-percent"></i>

    <i class="icon-calculator-times"></i>

<!-- ======================= -->
<!-- REDES SOCIAIS -->
<!-- ======================= -->

    <i class="icon-facebook"></i>

<!-- BOLD -->
<section class="gra-margin-bottom-2xl">
<h2 class="gra-font-xl gra-margin-bottom-l">Bold</h2>
<div class="icon-grid">
<i class="icon-circle-info-solid"></i>
<i class="icon-danger-solid"></i>
<i class="icon-circle-times-solid"></i>

</main>

<style>
.icon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 20px;
}

.icon-grid i {
  font-size: 26px;
  text-align: center;
  padding: 20px;
  border: 1px solid #e6e6e6;
  border-radius: 8px;
  display: block;
}
</style>
