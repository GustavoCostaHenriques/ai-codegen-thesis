<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (week(); as weekRef) {
      <div>
        <h2 data-cy="weekDetailsHeading"><span jhiTranslate="weeklyplanningApp.week.detail.title">Week</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ weekRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="weeklyplanningApp.week.label">Label</span></dt>
          <dd>
            <span>{{ weekRef.label }}</span>
          </dd>
          <dt><span jhiTranslate="weeklyplanningApp.week.startDate">Start Date</span></dt>
          <dd>
            <span>{{ weekRef.startDate | formatMediumDate }}</span>
          </dd>
          <dt><span jhiTranslate="weeklyplanningApp.week.endDate">End Date</span></dt>
          <dd>
            <span>{{ weekRef.endDate | formatMediumDate }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/week', weekRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
