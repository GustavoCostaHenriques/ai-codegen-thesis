<h2 mat-dialog-title>Cancel Tournament</h2>
<mat-dialog-content>
  <p>Are you sure you want to cancel this tournament?</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="warn" (click)="onConfirm()">Confirm</button>
</mat-dialog-actions>
