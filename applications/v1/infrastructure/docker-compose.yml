services:
  backend:
    build:
      context: ..
      dockerfile: infrastructure/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
  frontend:
    build:
      context: ..
      dockerfile: infrastructure/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend