    WeekCreateRequest:
      type: object
      description: |
        Creates a new week. Weeks typically span Monday to Sunday.
      properties:
        label:
          type: string
          minLength: 1
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/WeekStatus'
      required:
        - label
        - startDate
        - endDate
    WeekUpdateRequest:
      type: object
      description: |
        Updates a week. When setting status to PUBLISHED or LOCKED, the server
        validates business rules (at least one user per day, at least one project
        per user per day, and at least one task per project with minimum text
        length).
      properties:
        label:
          type: string
          minLength: 1
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/WeekStatus'
      required:
        - label
        - startDate
        - endDate
    WeekDuplicateRequest:
      type: object
      description: Creates a new week by duplicating the source week.
      properties:
        label:
          type: string
          minLength: 1
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
      required:
        - label
        - startDate
        - endDate
    DayUserCreateRequest:
      type: object
      description: |
        Adds a user to a day. The user cannot already be assigned to the same day.
      properties:
        userId:
          type: string
          format: uuid
      required:
        - userId
    DayUserProjectAssignRequest:
      type: object
      description: |
        Assigns a project to a user on a day. The same project cannot be assigned
        more than once to the same user on the same day.
      properties:
        projectId:
          type: string
          format: uuid
      required:
        - projectId
    TaskCreateRequest:
      type: object
      description: Adds a task to a user project on a day.
