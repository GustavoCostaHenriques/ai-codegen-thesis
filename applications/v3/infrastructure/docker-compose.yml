name: weekly-planning

services:
  traefik:
    image: traefik:v3.2
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:-ops@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - public
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weekly_planning}
      POSTGRES_USER: ${POSTGRES_USER:-weekly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in infrastructure/.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-weekly} -d ${POSTGRES_DB:-weekly_planning}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ..
      dockerfile: infrastructure/docker/backend.Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://database:5432/${POSTGRES_DB:-weekly_planning}
      DB_USER: ${POSTGRES_USER:-weekly}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in infrastructure/.env}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in infrastructure/.env}
      JWT_ISSUER: ${JWT_ISSUER:-weekly-planning}
      JWT_EXP_MINUTES: ${JWT_EXP_MINUTES:-60}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Administrator}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@weekly.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?set BOOTSTRAP_ADMIN_PASSWORD in infrastructure/.env}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - public
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=${PUBLIC_NETWORK_NAME:-weekly_planning_public}
      - traefik.http.routers.backend-http.rule=Host(`${APP_HOST:-localhost}`) && PathPrefix(`/api/v1`)
      - traefik.http.routers.backend-http.entrypoints=web
      - traefik.http.routers.backend-http.priority=100
      - traefik.http.routers.backend-http.service=backend-service
      - traefik.http.routers.backend-https.rule=Host(`${APP_HOST:-localhost}`) && PathPrefix(`/api/v1`)
      - traefik.http.routers.backend-https.entrypoints=websecure
      - traefik.http.routers.backend-https.priority=100
      - traefik.http.routers.backend-https.tls=true
      - traefik.http.routers.backend-https.tls.certresolver=letsencrypt
      - traefik.http.routers.backend-https.service=backend-service
      - traefik.http.services.backend-service.loadbalancer.server.port=8080
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "status=$$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/v1/auth/sessions -H 'Content-Type: application/json' -d '{\"username\":\"healthcheck\",\"password\":\"healthcheck\"}'); [ $$status -ge 200 ] && [ $$status -lt 500 ]",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 35s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ..
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - public
    labels:
      - traefik.enable=true
      - traefik.docker.network=${PUBLIC_NETWORK_NAME:-weekly_planning_public}
      - traefik.http.routers.frontend-http.rule=Host(`${APP_HOST:-localhost}`)
      - traefik.http.routers.frontend-http.entrypoints=web
      - traefik.http.routers.frontend-http.priority=1
      - traefik.http.routers.frontend-http.service=frontend-service
      - traefik.http.routers.frontend-https.rule=Host(`${APP_HOST:-localhost}`)
      - traefik.http.routers.frontend-https.entrypoints=websecure
      - traefik.http.routers.frontend-https.priority=1
      - traefik.http.routers.frontend-https.tls=true
      - traefik.http.routers.frontend-https.tls.certresolver=letsencrypt
      - traefik.http.routers.frontend-https.service=frontend-service
      - traefik.http.services.frontend-service.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  account-seeder:
    image: curlimages/curl:8.12.1
    environment:
      VIEWER_NAME: ${VIEWER_NAME:-Viewer User}
      VIEWER_EMAIL: ${VIEWER_EMAIL:-viewer@example.com}
      VIEWER_PASSWORD: ${VIEWER_PASSWORD:?set VIEWER_PASSWORD in infrastructure/.env}
    command:
      - sh
      - -ec
      - >
        status=$$(curl -s -o /tmp/viewer-response.json -w '%{http_code}'
        -X POST
        http://backend:8080/api/v1/accounts
        -H 'Content-Type: application/json'
        -d "{\"name\":\"$${VIEWER_NAME}\",\"email\":\"$${VIEWER_EMAIL}\",\"password\":\"$${VIEWER_PASSWORD}\"}");
        if [ "$$status" = "201" ] || [ "$$status" = "409" ]; then
          exit 0;
        fi;
        cat /tmp/viewer-response.json;
        exit 1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: "no"
    security_opt:
      - no-new-privileges:true

networks:
  public:
    name: ${PUBLIC_NETWORK_NAME:-weekly_planning_public}
    driver: bridge
  internal:
    name: ${PRIVATE_NETWORK_NAME:-weekly_planning_internal}
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  letsencrypt_data:
