services:
  db:
    image: postgres:16
    container_name: weekly_planning_db
    environment:
      POSTGRES_DB: weekly_planning
      POSTGRES_USER: weekly
      POSTGRES_PASSWORD: weekly
    ports:
      - "5432:5432"
    volumes:
      - weekly_planning_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: weekly_planning_redis
    ports:
      - "6379:6379"

volumes:
  weekly_planning_db_data:
