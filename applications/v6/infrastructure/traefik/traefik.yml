global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: false

ping: {}

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: weekly-planning-public

certificatesResolvers:
  letsencrypt:
    acme:
      email: "ops@example.invalid"
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO

accessLog: {}
