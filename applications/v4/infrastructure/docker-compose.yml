services:
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    environment:
      PUBLIC_NETWORK_NAME: ${PUBLIC_NETWORK_NAME}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik-acme:/letsencrypt
    networks:
      - public

  backend:
    build:
      context: ../backend
      dockerfile: ../infrastructure/docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://database:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_SECONDS: ${APP_JWT_EXPIRATION_SECONDS}
      APP_BRUTE_FORCE_MAX_ATTEMPTS: ${APP_BRUTE_FORCE_MAX_ATTEMPTS}
      APP_BRUTE_FORCE_LOCK_MINUTES: ${APP_BRUTE_FORCE_LOCK_MINUTES}
      APP_PASSWORD_MIN_LENGTH: ${APP_PASSWORD_MIN_LENGTH}
      APP_PASSWORD_REQUIRE_UPPERCASE: ${APP_PASSWORD_REQUIRE_UPPERCASE}
      APP_PASSWORD_REQUIRE_LOWERCASE: ${APP_PASSWORD_REQUIRE_LOWERCASE}
      APP_PASSWORD_REQUIRE_DIGIT: ${APP_PASSWORD_REQUIRE_DIGIT}
      APP_PASSWORD_REQUIRE_SPECIAL: ${APP_PASSWORD_REQUIRE_SPECIAL}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PUBLIC_NETWORK_NAME}"
      - "traefik.http.routers.backend.rule=Host(`${APP_HOST}`) && (PathPrefix(`/api`) || PathPrefix(`/actuator`))"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.priority=100"
      - "traefik.http.routers.backend.service=backend"
      - "traefik.http.routers.backend-secure.rule=Host(`${APP_HOST}`) && (PathPrefix(`/api`) || PathPrefix(`/actuator`))"
      - "traefik.http.routers.backend-secure.entrypoints=websecure"
      - "traefik.http.routers.backend-secure.priority=100"
      - "traefik.http.routers.backend-secure.tls=true"
      - "traefik.http.routers.backend-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend-secure.service=backend"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
    networks:
      - public
      - private

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infrastructure/docker/frontend.Dockerfile
      args:
        FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PUBLIC_NETWORK_NAME}"
      - "traefik.http.routers.frontend.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.routers.frontend.service=frontend"
      - "traefik.http.routers.frontend-secure.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.frontend-secure.entrypoints=websecure"
      - "traefik.http.routers.frontend-secure.priority=1"
      - "traefik.http.routers.frontend-secure.tls=true"
      - "traefik.http.routers.frontend-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend-secure.service=frontend"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - public

  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - private

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - private

networks:
  public:
    name: ${PUBLIC_NETWORK_NAME}
    driver: bridge
  private:
    name: ${PRIVATE_NETWORK_NAME}
    driver: bridge
    internal: true

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME}
  traefik-acme:
    name: ${TRAEFIK_ACME_VOLUME_NAME}
