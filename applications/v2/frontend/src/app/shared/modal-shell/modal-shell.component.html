<div class="modal-backdrop" (click)="closeModal()">
  <section class="modal-panel" [style.width]="width" (click)="$event.stopPropagation()">
    <header class="modal-header" *ngIf="title">
      <h2>{{ title }}</h2>
    </header>

    <div class="modal-content">
      <ng-content></ng-content>
    </div>
  </section>
</div>
