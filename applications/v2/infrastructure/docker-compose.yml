services:
  backend:
    build:
      context: ..
      dockerfile: infrastructure/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DOCKER_COMPOSE_ENABLED=false
      # Aqui forçamos o Java a olhar para os nomes dos serviços abaixo
      - SPRING_DATA_REDIS_HOST=redis
      - JHIPSTER_CACHE_REDIS_SERVER=redis://redis:6379
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/weeklyplanning
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: infrastructure/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  # Isto cria um servidor Redis "do nada" para si
  redis:
    image: redis:7-alpine
    container_name: redis-server

  # Isto cria um banco de dados PostgreSQL "do nada" para si
  database:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=weeklyplanning
      - POSTGRES_PASSWORD=
      - POSTGRES_DB=weeklyplanning
      - POSTGRES_HOST_AUTH_METHOD=trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weeklyplanning"]
      interval: 5s
      timeout: 5s
      retries: 5