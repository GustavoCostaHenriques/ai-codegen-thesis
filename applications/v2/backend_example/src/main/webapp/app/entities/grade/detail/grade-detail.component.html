<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (grade(); as gradeRef) {
      <div>
        <h2 data-cy="gradeDetailsHeading"><span jhiTranslate="escolaApp.grade.detail.title">Grade</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ gradeRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="escolaApp.grade.value">Value</span></dt>
          <dd>
            <span>{{ gradeRef.value }}</span>
          </dd>
          <dt><span jhiTranslate="escolaApp.grade.finished">Finished</span></dt>
          <dd>
            <span>{{ gradeRef.finished }}</span>
          </dd>
          <dt><span jhiTranslate="escolaApp.grade.student">Student</span></dt>
          <dd>
            @if (grade()!.student) {
              <div>
                <a [routerLink]="['/student', grade()!.student?.id, 'view']">{{ gradeRef.student?.id }}</a>
              </div>
            }
          </dd>
          <dt><span jhiTranslate="escolaApp.grade.disciplina">Disciplina</span></dt>
          <dd>
            @if (grade()!.disciplina) {
              <div>
                <a [routerLink]="['/disciplina', grade()!.disciplina?.id, 'view']">{{ gradeRef.disciplina?.id }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/grade', gradeRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
